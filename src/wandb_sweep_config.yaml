name: da6401_mlp_sweep
method: random
metric:
  name: val/f1
  goal: maximize
parameters:
  dataset:
    values: [mnist]
  epochs:
    values: [8, 10, 12]
  batch_size:
    values: [32, 64, 128]
  optimizer:
    values: [sgd, momentum, nag, rmsprop]
  loss:
    values: [cross_entropy, mean_squared_error]
  activation:
    values: [relu, sigmoid, tanh]
  learning_rate:
    values: [0.0005, 0.001, 0.003, 0.01]
  weight_decay:
    values: [0.0, 0.00001, 0.0001]
  num_layers:
    values: [2, 3, 4, 5, 6]
  hidden_size:
    values:
      - [64]
      - [96]
      - [128]
      - [64, 64, 64]
      - [128, 128, 128]
  weight_init:
    values: [random, xavier, zeros]
